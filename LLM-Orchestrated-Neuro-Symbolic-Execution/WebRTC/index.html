<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebRTC Demo - Egocentric Co-Pilot</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; background: #f0f2f5; display: flex; justify-content: center }
  .container { width: 90%; max-width: 880px; background: #fff; margin: 24px; padding: 24px; border-radius: 12px; box-shadow: 0 4px 12px rgba(0,0,0,.1) }
  h1 { margin: 0 0 8px }
  p.sub { color: #666; margin: 0 0 16px; font-size: 14px }
  .controls { display: flex; gap: 12px; margin-bottom: 16px }
  button { padding: 10px 24px; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; color: #fff }
  #startBtn { background: #007bff }
  #stopBtn { background: #dc3545 }
  button:disabled { background: #ccc; cursor: default }
  #status { padding: 10px 12px; border-radius: 6px; font-weight: 600; margin-bottom: 16px }
  .connected { color: #155724; background: #d4edda; border: 1px solid #c3e6cb }
  .disconnected { color: #721c24; background: #f8d7da; border: 1px solid #f5c6cb }
  .connecting { color: #856404; background: #fff3cd; border: 1px solid #ffeeba }
  .videos { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px }
  .video-box { flex: 1; min-width: 280px }
  .video-box label { display: block; font-weight: 600; margin-bottom: 4px; font-size: 14px; color: #555 }
  video { width: 100%; border-radius: 8px; background: #000 }
  #transcript { border: 1px solid #dee2e6; border-radius: 8px; padding: 12px; min-height: 80px; max-height: 200px; overflow-y: auto; font-size: 14px; color: #333; background: #f8f9fa; line-height: 1.6 }
  #transcript:empty::before { content: "ASR transcription will appear here..."; color: #aaa }
</style>
</head>
<body>
<div class="container">
  <h1>WebRTC Demo</h1>
  <p class="sub">A: Video echoed back from server &nbsp;|&nbsp; B: Audio transcribed by Whisper ASR via data channel</p>

  <div class="controls">
    <button id="startBtn">Connect</button>
    <button id="stopBtn" disabled>Disconnect</button>
  </div>

  <div id="status" class="disconnected">Not connected</div>

  <div class="videos">
    <div class="video-box">
      <label>Local (camera)</label>
      <video id="localVideo" autoplay muted playsinline></video>
    </div>
    <div class="video-box">
      <label>Remote (echoed from server)</label>
      <video id="remoteVideo" autoplay playsinline></video>
    </div>
  </div>

  <label style="font-weight:600; font-size:14px; color:#555">ASR Transcription</label>
  <div id="transcript"></div>
</div>

<script>
const startBtn = document.getElementById('startBtn');
const stopBtn = document.getElementById('stopBtn');
const statusDiv = document.getElementById('status');
const localVideo = document.getElementById('localVideo');
const remoteVideo = document.getElementById('remoteVideo');
const transcript = document.getElementById('transcript');

let pc = null;
let stream = null;
let dc = null;

function setStatus(text, cls) {
  statusDiv.textContent = text;
  statusDiv.className = cls;
}

function addTranscript(text) {
  transcript.textContent = text;
  transcript.scrollTop = transcript.scrollHeight;
}

startBtn.onclick = async () => {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: { channelCount: 1, echoCancellation: true, noiseSuppression: true }
    });
  } catch (e) {
    alert('Cannot access camera/microphone: ' + e.message);
    return;
  }

  localVideo.srcObject = stream;
  setStatus('Connecting...', 'connecting');

  pc = new RTCPeerConnection();

  // Add local tracks
  stream.getTracks().forEach(track => pc.addTrack(track, stream));

  // A: Receive echoed video from server
  pc.ontrack = (event) => {
    if (event.track.kind === 'video') {
      // event.streams[0] can be empty when server adds track without a stream
      if (event.streams && event.streams[0]) {
        remoteVideo.srcObject = event.streams[0];
      } else {
        const ms = new MediaStream();
        ms.addTrack(event.track);
        remoteVideo.srcObject = ms;
      }
    }
  };

  // B: Data channel for ASR results
  dc = pc.createDataChannel('asr');
  dc.onmessage = (event) => {
    try {
      const msg = JSON.parse(event.data);
      if (msg.type === 'asr' && msg.text) {
        addTranscript(msg.text);
      }
    } catch (e) {
      console.warn('Data channel message parse error:', e);
    }
  };

  pc.onconnectionstatechange = () => {
    if (pc.connectionState === 'connected') setStatus('Connected', 'connected');
    else if (pc.connectionState === 'failed') setStatus('Connection failed', 'disconnected');
  };

  // Signaling
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  const resp = await fetch('/offer', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ sdp: pc.localDescription.sdp, type: pc.localDescription.type })
  });
  const answer = await resp.json();
  await pc.setRemoteDescription(answer);

  startBtn.disabled = true;
  stopBtn.disabled = false;
};

stopBtn.onclick = () => {
  if (dc) { dc.close(); dc = null; }
  if (pc) { pc.close(); pc = null; }
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  localVideo.srcObject = null;
  remoteVideo.srcObject = null;
  startBtn.disabled = false;
  stopBtn.disabled = true;
  setStatus('Disconnected', 'disconnected');
};
</script>
</body>
</html>
